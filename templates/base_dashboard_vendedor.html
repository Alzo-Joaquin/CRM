<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Panel de Ventas{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="vs-light-theme">

  <main class="vs-app-container">
    <header class="vs-header">
      <div class="vs-header-inner">
        <div class="vs-brand">
          <h1 class="vs-title">{% block page_title %}Panel Operativo{% endblock %}</h1>
          <p class="vs-subtitle">{% block page_subtitle %}Gestión comercial de ventas{% endblock %}</p>
        </div>

        <div class="vs-user-profile">
          <div class="vs-user-details">
            <span class="vs-username">{{ current_user.nombre }}</span>
            <span class="vs-user-role">{{ current_user.rol }}</span>
          </div>
          <a href="{{ url_for('auth.logout') }}" class="vs-logout">Cerrar sesión</a>
        </div>
      </div>
    </header>

    <section class="vs-content">
      {% block content %}{% endblock %}
    </section>
  </main>

</body>
</html>
