<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Panel de Control Admin{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="db-admin-theme">

  <main class="db-viewport">
    <header class="db-header-full">
      <div class="db-header-container">
        <div class="db-title-group">
          <h1 class="db-main-title">{% block page_title %}Dashboard Administrativo{% endblock %}</h1>
          <p class="db-tagline">{% block page_subtitle %}Centro de control del negocio{% endblock %}</p>
        </div>

        <div class="db-user-identity">
          <div class="db-user-info">
            <span class="db-user-name">{{ current_user.nombre }}</span>
            <span class="db-user-badge">{{ current_user.rol }}</span>
          </div>
          <a href="{{ url_for('auth.logout') }}" class="db-logout-btn">
             <span>Salir del Panel</span>
          </a>
        </div>
      </div>
    </header>

    <section class="db-canvas">
      {% block content %}{% endblock %}
    </section>
  </main>

</body>
</html>
