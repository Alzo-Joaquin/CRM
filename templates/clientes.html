<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <div class="contenedor">
    <h1>Gestión de Clientes</h1>

    <div class="menu">
      <a class="boton secundario" href="/">Volver al inicio</a>
    </div>

    <section class="card">
      <h2>Crear cliente</h2>

      <form id="form-cliente">
        <div class="campo">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" required>
        </div>

        <div class="campo">
          <label for="apellido">Apellido</label>
          <input type="text" id="apellido" name="apellido" required>
        </div>

        <div class="campo">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="campo">
          <label for="telefono">Teléfono</label>
          <input type="text" id="telefono" name="telefono">
        </div>

        <div class="campo">
          <label for="direccion">Dirección</label>
          <input type="text" id="direccion" name="direccion">
        </div>

        <button class="boton" type="submit">Guardar cliente</button>
      </form>

      <p id="mensaje"></p>
    </section>

    <section class="card">
      <h2>Listado de clientes</h2>
      <button class="boton" id="btn-recargar">Recargar lista</button>

      <table id="tabla-clientes">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Email</th>
            <th>Teléfono</th>
            <th>Dirección</th>
            <th>Activo</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>
    </section>
  </div>

  <script src="{{ url_for('static', filename='js/clientes.js') }}"></script>
</body>
</html>
