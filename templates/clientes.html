{% extends "base.html" %}

{% block title %}Clientes - CRM{% endblock %}
{% block page_title %}Gestión de Clientes{% endblock %}

{% block content %}
  <div class="card">
    <h2>Crear cliente</h2>

    <form id="form-cliente">
      <div class="form-grid">
        <div class="campo">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" required>
        </div>

        <div class="campo">
          <label for="apellido">Apellido</label>
          <input type="text" id="apellido" name="apellido" required>
        </div>

        <div class="campo">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="campo">
          <label for="telefono">Teléfono</label>
          <input type="text" id="telefono" name="telefono">
        </div>

        <div class="campo campo-completo">
          <label for="direccion">Dirección</label>
          <input type="text" id="direccion" name="direccion">
        </div>
      </div>

      <button class="boton" type="submit">Guardar cliente</button>
    </form>

    <p id="mensaje"></p>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>Listado de clientes</h2>
      <button class="boton" id="btn-recargar">Recargar lista</button>
    </div>

    <div class="tabla-wrapper">
      <table id="tabla-clientes">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Email</th>
            <th>Teléfono</th>
            <th>Dirección</th>
            <th>Activo</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/clientes.js') }}"></script>
{% endblock %}
